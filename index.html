<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RizzKing Movies | Absolute Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* SUPREME RED CURSOR */
        html, body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="red" stroke="black" stroke-width="1.5"><path d="M7 2l12 11.2-5.8.8 3.3 7.2-2.2 1-3.3-7.2-4 3.8z"/></svg>'), auto;
        }

        .movie-card { transition: all 0.3s ease; cursor: inherit; border: 1px solid #1a1a1a; }
        .movie-card:hover { transform: translateY(-10px); filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6)); border-color: #ff0000; }
        
        #player-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; }
        .active-btn { background-color: #dc2626 !important; box-shadow: 0 0 10px #ff0000; }
        
        /* ANTON HIGHLIGHT HOVER */
        .anton-name { transition: all 0.3s ease; color: #ff0000; text-decoration: underline; text-underline-offset: 4px; cursor: inherit; }
        .anton-name:hover { color: #ff3333; text-shadow: 0 0 25px #ff0000, 0 0 50px #ff0000; font-size: 1.3rem; }

        /* CLEAN FOOTER */
        .rizz-footer {
            border-top: 3px solid #ff0000;
            background: linear-gradient(to top, #1a0000, #000);
            padding: 60px 20px;
            text-align: center;
        }

        .rizz-badge { position: absolute; top: 10px; right: 10px; background: #ff0000; color: white; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 900; z-index: 10; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <nav class="p-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-zinc-800 bg-black/80 sticky top-0 z-50 backdrop-blur-lg">
        <h1 class="text-4xl font-black italic tracking-tighter text-red-600 cursor-pointer hover:brightness-125" onclick="window.location.href='./'">RIZZKING <span class="text-white">MOVIES</span></h1>
        
        <div class="flex gap-6">
            <button onclick="loadMovies()" class="font-bold hover:text-red-600 transition uppercase tracking-widest">Movies</button>
            <button onclick="loadTV()" class="font-bold hover:text-red-600 transition uppercase tracking-widest">TV Shows</button>
        </div>

        <div class="relative w-full md:w-96">
            <input type="text" id="search-input" placeholder="Search for absolute cinema..." 
                   class="w-full bg-zinc-900 border border-zinc-800 px-6 py-3 rounded-2xl focus:outline-none focus:border-red-600 transition shadow-inner">
        </div>
    </nav>

    <main class="p-8 max-w-7xl mx-auto">
        <section id="fav-section" class="mb-16">
            <h2 class="text-3xl font-black italic mb-8 text-red-600 uppercase tracking-tighter">RizzKings Favourites</h2>
            <div id="fav-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="movie-card bg-zinc-900 rounded-2xl overflow-hidden relative" onclick="playMedia('27576', 'movie', 'The Expendables')">
                    <div class="rizz-badge">RIZZ CHOICE</div>
                    <img src="https://image.tmdb.org/t/p/w780/p7vT6idvL89O6q6xM0yXw3q6xM0.jpg" class="w-full">
                    <p class="p-4 font-bold text-lg">The Expendables</p>
                </div>
                <div class="movie-card bg-zinc-900 rounded-2xl overflow-hidden relative" onclick="playMedia('9351', 'movie', 'Natural Born Killers')">
                    <div class="rizz-badge">RIZZ CHOICE</div>
                    <img src="https://image.tmdb.org/t/p/w780/m8BvCInl4Y4rEshYfE9U7oU9LpA.jpg" class="w-full">
                    <p class="p-4 font-bold text-lg">Natural Born Killers</p>
                </div>
                <div class="movie-card bg-zinc-900 rounded-2xl overflow-hidden relative" onclick="playMedia('807', 'movie', 'Se7en')">
                    <div class="rizz-badge">RIZZ CHOICE</div>
                    <img src="https://image.tmdb.org/t/p/w780/69Snp98Y6S6559779v8u5XrsMG8.jpg" class="w-full">
                    <p class="p-4 font-bold text-lg">Se7en</p>
                </div>
            </div>
        </section>

        <h2 id="grid-title" class="text-xl font-bold mb-8 text-zinc-500 uppercase tracking-[0.2em]">Trending Now</h2>
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            <div class="col-span-full text-center py-20 text-zinc-600 italic">Connecting to the database...</div>
        </div>
    </main>

    <div id="player-overlay">
        <div class="flex flex-col h-full">
            <div class="p-4 bg-zinc-950 flex justify-between items-center border-b border-zinc-800">
                <div class="flex items-center gap-6">
                    <h3 id="playing-title" class="text-xl font-black text-red-600 uppercase italic">Loading Cinema...</h3>
                    <div class="flex gap-3">
                        <button id="srv1" onclick="switchServer(1)" class="bg-zinc-800 px-4 py-2 rounded-lg text-xs font-black active-btn transition">SERVER 1</button>
                        <button id="srv2" onclick="switchServer(2)" class="bg-zinc-800 px-4 py-2 rounded-lg text-xs font-black transition">SERVER 2</button>
                    </div>
                </div>
                <button onclick="closePlayer()" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-xl font-black shadow-lg">CLOSE ×</button>
            </div>
            <div class="flex-grow bg-black">
                <iframe id="player-frame" src="" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer class="rizz-footer">
        <p class="font-black italic text-xl uppercase tracking-[0.3em] mb-2 text-zinc-500">The Ultimate Hub</p>
        <p class="font-black italic text-2xl uppercase tracking-tighter">
            Ur welcome - <span class="anton-name">Anton AKA Rizzking</span>
        </p>
    </footer>

    <script>
        const API_KEY = 'c151dd5e3f53032433742137e48cd90f'; 
        const grid = document.getElementById('movie-grid');
        const searchInput = document.getElementById('search-input');
        let currentId = '';
        let currentType = 'movie';

        async function loadMovies(query = '') {
            currentType = 'movie';
            const url = query 
                ? `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`
                : `https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('grid-title').innerText = query ? `Search Results: ${query}` : "Trending Movies";
            renderMedia(data.results, 'movie');
        }

        async function loadTV() {
            currentType = 'tv';
            const url = `https://api.themoviedb.org/3/trending/tv/day?api_key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('grid-title').innerText = "Trending TV Shows";
            renderMedia(data.results, 'tv');
        }

        function renderMedia(items, type) {
            grid.innerHTML = items.map(m => `
                <div class="movie-card bg-zinc-900 rounded-2xl overflow-hidden shadow-2xl" onclick="playMedia('${m.id}', '${type}', '${(m.title || m.name).replace(/'/g, "")}')">
                    <img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w500' + m.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" class="w-full h-full object-cover">
                    <div class="p-4 bg-zinc-950/80">
                        <h3 class="font-bold text-xs line-clamp-1 uppercase tracking-tighter">${m.title || m.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-[10px] text-zinc-500 font-black">${(m.release_date || m.first_air_date)?.split('-')[0] || 'N/A'}</span>
                            <span class="text-[10px] bg-red-600 text-white px-2 py-0.5 rounded-md font-black">★ ${m.vote_average.toFixed(1)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function playMedia(id, type, title) {
            currentId = id;
            currentType = type;
            document.getElementById('playing-title').innerText = title;
            switchServer(1);
            document.getElementById('player-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function switchServer(num) {
            const frame = document.getElementById('player-frame');
            document.getElementById('srv1').classList.toggle('active-btn', num === 1);
            document.getElementById('srv2').classList.toggle('active-btn', num === 2);
            frame.src = num === 1
