<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RizzKing Movies | Absolute Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* GLOBAL RED CURSOR */
        html, body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="red" stroke="white" stroke-width="1"><path d="M7 2l12 11.2-5.8.8 3.3 7.2-2.2 1-3.3-7.2-4 3.8z"/></svg>'), auto;
        }

        .movie-card { transition: all 0.3s ease; cursor: inherit; border: 1px solid #1a1a1a; background: #0a0a0a; }
        .movie-card:hover { transform: translateY(-10px); filter: drop-shadow(0 0 15px rgba(220, 38, 38, 0.5)); border-color: #ff0000; }
        
        #player-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; }
        .active-btn { background-color: #dc2626 !important; box-shadow: 0 0 10px #ff0000; }
        
        /* ANTON HOVER EFFECT */
        .anton-name { transition: all 0.4s ease; color: #ff0000; cursor: inherit; text-decoration: none; }
        .anton-name:hover { color: #ff5555; text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000; }

        .rizz-footer {
            border-top: 2px solid #1a1a1a;
            background: linear-gradient(to top, #0a0000, #000);
            padding: 50px 20px;
            text-align: center;
        }

        .tv-select {
            background: #111;
            color: #ff0000; 
            border: 1px solid #dc2626;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 900;
            outline: none;
        }

        .surprise-btn {
            background: linear-gradient(45deg, #dc2626, #7f1d1d);
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.4);
        }
        .surprise-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(220, 38, 38, 0.7);
        }

        /* POPUP STYLES */
        #welcome-popup {
            display: flex;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .popup-content {
            background: #0a0a0a;
            border: 2px solid #dc2626;
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.4);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            animation: popupEntry 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popupEntry {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="welcome-popup">
        <div class="popup-content">
            <h2 class="text-3xl font-black italic text-red-600 mb-4 tracking-tighter uppercase">Welcome to the Best Movie Site</h2>
            <p class="text-zinc-300 font-bold mb-6 leading-relaxed">
                To keep the experience <span class="text-white">absolute cinema</span>, I strongly advise using an <span class="text-red-500">Adblocker</span> and a <span class="text-red-500">Popup Blocker</span>. The servers can get a bit rowdy.
            </p>
            <p class="text-zinc-500 text-sm italic mb-8 uppercase tracking-widest">- Anton</p>
            <button onclick="closePopup()" class="surprise-btn w-full py-4 rounded-xl font-black uppercase tracking-tighter text-lg transition-all">
                I'm Ready
            </button>
        </div>
    </div>

    <nav class="p-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-zinc-800 bg-black/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="flex flex-col items-start">
            <h1 class="text-4xl font-black italic tracking-tighter text-red-600 cursor-pointer" onclick="location.reload()">RIZZKING <span class="text-white">MOVIES</span></h1>
            <button onclick="pickRandom()" class="surprise-btn text-[10px] font-black uppercase px-3 py-1 rounded-full border border-red-500/50 transition-all mt-1 ml-1">Surprise Me</button>
        </div>
        
        <div class="flex gap-4">
            <button id="movie-tab" onclick="setTab('movie')" class="font-bold text-red-600 transition uppercase text-sm px-4 py-2 rounded-lg">Movies</button>
            <button id="tv-tab" onclick="setTab('tv')" class="font-bold hover:text-red-600 transition uppercase text-sm px-4 py-2 rounded-lg">TV Shows</button>
        </div>

        <div class="relative w-full md:w-96">
            <input type="text" id="search-input" placeholder="Search absolute cinema..." 
                   class="w-full bg-zinc-900 border border-zinc-700 px-5 py-3 rounded-xl focus:outline-none focus:border-red-600 transition text-white">
        </div>
    </nav>

    <main class="p-8 max-w-7xl mx-auto">
        <h2 id="grid-title" class="text-xl font-bold mb-6 text-zinc-500 uppercase tracking-widest italic border-l-4 border-red-600 pl-4">Trending Movies</h2>
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
    </main>

    <div id="player-overlay">
        <div class="flex flex-col h-full">
            <div class="p-4 bg-zinc-900 flex justify-between items-center border-b border-zinc-800 flex-wrap gap-4">
                <div class="flex items-center gap-6">
                    <h3 id="playing-title" class="text-xl font-black text-red-600 uppercase italic truncate max-w-[200px]">Loading...</h3>
                    <div id="tv-ui" style="display: none;" class="flex gap-2">
                        <select id="s-select" onchange="updateS()" class="tv-select"></select>
                        <select id="e-select" onchange="updateE()" class="tv-select"></select>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex gap-2">
                        <button id="s1" onclick="serv(1)" class="bg-zinc-800 px-4 py-1.5 rounded text-[10px] font-black active-btn transition">SERVER 1</button>
                        <button id="s2" onclick="serv(2)" class="bg-zinc-800 px-4 py-1.5 rounded text-[10px] font-black transition">SERVER 2</button>
                    </div>
                    <button onclick="closeP()" class="bg-red-600 px-6 py-1.5 rounded-lg font-black text-sm shadow-lg hover:bg-red-700 transition">CLOSE ×</button>
                </div>
            </div>
            <div class="flex-grow bg-black">
                <iframe id="main-frame" src="" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer class="rizz-footer">
        <p class="font-black italic text-xl uppercase tracking-widest">Ur welcome - <span class="anton-name">Anton</span></p>
        <p style="text-align: center; color: #52525b; font-size: 10px; text-transform: uppercase; margin-top: 20px; opacity: 0.5; font-family: sans-serif; tracking-tighter;">HOT HUZZ HML</p>
    </footer>

    <script>
        const KEY = 'c151dd5e3f53032433742137e48cd90f'; 
        const grid = document.getElementById('movie-grid');
        const qInput = document.getElementById('search-input');
        let mode = 'movie', curID = '', curS = 1, curE = 1;

        function setTab(t) {
            mode = t; qInput.value = "";
            document.getElementById('movie-tab').style.color = (t === 'movie') ? '#dc2626' : 'white';
            document.getElementById('tv-tab').style.color = (t === 'tv') ? '#dc2626' : 'white';
            fetchData();
        }

        async function fetchData(q = "") {
            const path = q ? `search/${mode}` : `trending/${mode}/day`;
            const param = q ? `&query=${encodeURIComponent(q)}` : '';
            const res = await fetch(`https://api.themoviedb.org/3/${path}?api_key=${KEY}${param}`);
            const data = await res.json();
            document.getElementById('grid-title').innerText = q ? `RESULTS: ${q.toUpperCase()}` : `TRENDING ${mode.toUpperCase()}S`;
            grid.innerHTML = data.results.map(m => `
                <div class="movie-card rounded-2xl overflow-hidden shadow-xl" onclick="openP('${m.id}', '${(m.title || m.name).replace(/'/g, "")}')">
                    <img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w500' + m.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" class="w-full">
                    <div class="p-4 bg-zinc-950/50">
                        <h3 class="font-black text-[10px] uppercase truncate">${m.title || m.name}</h3>
                        <div class="flex justify-between items-center mt-1">
                            <span class="text-[9px] text-zinc-500 font-bold">${(m.release_date || m.first_air_date)?.split('-')[0] || 'N/A'}</span>
                            <span class="text-[9px] text-red-500 font-black">★ ${m.vote_average.toFixed(1)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function pickRandom() {
            const randPage = Math.floor(Math.random() * 20) + 1; 
            const res = await fetch(`https://api.themoviedb.org/3/discover/${mode}?api_key=${KEY}&page=${randPage}&sort_by=popularity.desc&vote_count.gte=100`);
            const data = await res.json();
            const randomItem = data.results[Math.floor(Math.random() * data.results.length)];
            openP(randomItem.id, randomItem.title || randomItem.name);
        }

        async function openP(id, title) {
            curID = id; curS = 1; curE = 1;
            document.getElementById('playing-title').innerText = title;
            const tvUI = document.getElementById('tv-ui');
            if (mode === 'tv') { tvUI.style.display = 'flex'; await loadTVData(id); } else { tvUI.style.display = 'none'; }
            serv(1);
            document.getElementById('player-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        async function loadTVData(id) {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${KEY}`);
            const data = await res.json();
            document.getElementById('s-select').innerHTML = data.seasons.filter(s => s.season_number > 0)
                .map(s => `<option value="${s.season_number}">SEASON ${s.season_number}</option>`).join('');
            await loadEpData();
        }

        async function loadEpData() {
            const sNum = document.getElementById('s-select').value;
            const res = await fetch(`https://api.themoviedb.org/3/tv/${curID}/season/${sNum}?api_key=${KEY}`);
            const data = await res.json();
            document.getElementById('e-select').innerHTML = data.episodes.map(e => `<option value="${e.episode_number}">EP ${e.episode_number}</option>`).join('');
        }

        function updateS() { curS = document.getElementById('s-select').value; curE = 1; loadEpData().then(() => serv(1)); }
        function updateE() { curE = document.getElementById('e-select').value; serv(1); }

        function serv(n) {
            const frame = document.getElementById('main-frame');
            document.getElementById('s1').classList.toggle('active-btn', n === 1);
            document.getElementById('s2').classList.toggle('active-btn', n === 2);
            frame.src = n === 1 ? (mode === 'movie' ? `https://vidking.net/embed/movie/${curID}` : `https://vidking.net/embed/tv/${curID}/${curS}/${curE}`)
                                : (mode === 'movie' ? `https://vidsrc.me/embed/movie?tmdb=${curID}` : `https://vidsrc.me/embed/tv?tmdb=${curID}&sea=${curS}&epi=${curE}`);
        }

        function closeP() { document.getElementById('player-overlay').style.display = 'none'; document.getElementById('main-frame').src = ''; document.body.style.overflow = 'auto'; }
        
        function closePopup() {
            document.getElementById('welcome-popup').style.display = 'none';
        }

        qInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchData(e.target.value); });
        fetchData();
    </script>
</body>
</html>
