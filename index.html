        html, body {

        #rizz-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -10%, rgba(220, 38, 38, 0.1), transparent 50%); z-index: -1; pointer-events: none; }

        nav { background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.03); }

        /* LOGO ANIMATION */
        .brand-logo {
            white-space: nowrap; font-size: 1.5rem; font-weight: 900; font-style: italic;
            letter-spacing: -0.05em; text-transform: lowercase;
            background: linear-gradient(90deg, #dc2626 0%, #dc2626 50%, white 50%, white 100%);
            background-size: 200% 100%;
            background-position: 0% 0;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pourRed 2.5s ease 0s 1 forwards, pourLoop 2.5s ease 10s infinite;
            padding: 0 4px;
            display: inline-block;
        }
        @keyframes pourRed { 0% { background-position: 100% 0; } 100% { background-position: 0% 0; } }
        @keyframes pourLoop { 0% { background-position: 0% 0; } 20% { background-position: 100% 0; } 40% { background-position: 0% 0; } 100% { background-position: 0% 0; } }

        .section-title { font-size: 1.2rem; font-weight: 800; color: #dc2626; text-transform: lowercase; font-style: italic; margin-bottom: 20px; }

        .rizz-login-btn { 
            background: #dc2626; color: white; font-weight: 900; text-transform: lowercase; 
            border-radius: 8px; padding: 10px 24px; transition: 0.3s; 
            animation: loginPulse 2s infinite; font-size: 12px; 
        }
        @keyframes loginPulse { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }

        .genre-pill.active { color: white; background: #dc2626; border-color: #dc2626; }

        .is-fav { color: #ff0000 !important; text-shadow: 0 0 10px red; }
