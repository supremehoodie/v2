<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RizzKing Movies | Absolute Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* GLOBAL RED CURSOR */
        html, body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="red" stroke="white" stroke-width="1"><path d="M7 2l12 11.2-5.8.8 3.3 7.2-2.2 1-3.3-7.2-4 3.8z"/></svg>'), auto;
        }

        .movie-card { transition: all 0.3s ease; cursor: inherit; border: 1px solid #1a1a1a; }
        .movie-card:hover { transform: translateY(-10px); filter: drop-shadow(0 0 15px rgba(220, 38, 38, 0.5)); border-color: #ff0000; }
        
        #player-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; }
        .active-btn { background-color: #dc2626 !important; }
        
        /* ANTON HOVER EFFECT */
        .anton-name { transition: all 0.4s ease; color: #ff0000; cursor: inherit; }
        .anton-name:hover { color: #ff5555; text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000; }

        /* CLEAN FOOTER HIGHLIGHT */
        .rizz-footer {
            border-top: 2px solid #1a1a1a;
            background: linear-gradient(to top, #0a0000, #000);
            padding: 50px 20px;
            text-align: center;
        }

        .rizz-badge { position: absolute; top: 10px; right: 10px; background: #ff0000; color: white; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 900; z-index: 10; }
    </style>
</head>
<body>

    <nav class="p-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-zinc-800 bg-black/50 sticky top-0 z-50 backdrop-blur-md">
        <h1 class="text-4xl font-black italic tracking-tighter text-red-600 cursor-pointer" onclick="window.location.href='./'">RIZZKING <span class="text-white">MOVIES</span></h1>
        
        <div class="flex gap-4">
            <button onclick="loadMovies()" class="font-bold hover:text-red-600 transition">MOVIES</button>
            <button onclick="loadTV()" class="font-bold hover:text-red-600 transition">TV SHOWS</button>
        </div>

        <div class="relative w-full md:w-96">
            <input type="text" id="search-input" placeholder="Search for rizz..." 
                   class="w-full bg-zinc-900 border border-zinc-700 px-5 py-3 rounded-xl focus:outline-none focus:border-red-600 transition">
        </div>
    </nav>

    <main class="p-8 max-w-7xl mx-auto">
        <section id="fav-section" class="mb-12">
            <h2 class="text-2xl font-black italic mb-6 text-red-600 uppercase">RizzKings Favourites</h2>
            <div id="fav-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6">
                <div class="movie-card bg-zinc-900 rounded-2xl overflow-hidden relative" onclick="playMedia('27576', 'movie', 'The Expendables')">
                    <div class="rizz-badge">RIZZ CHOICE</div>
                    <img src="https://image.tmdb.org/t/p/w500/p7vT6idvL89O6q6xM0yXw3q6xM0.jpg" class="w-full">
                    <p class="p-4 font-bold text-sm truncate">The Expendables</p>
                </div>
                <div class="movie-card bg-zinc-900 rounded-2xl overflow-hidden relative" onclick="playMedia('9351', 'movie', 'Natural Born Killers')">
                    <div class="rizz-badge">RIZZ CHOICE</div>
                    <img src="https://image.tmdb.org/t/p/w500/m8BvCInl4Y4rEshYfE9U7oU9LpA.jpg" class="w-full">
                    <p class="p-4 font-bold text-sm truncate">Natural Born Killers</p>
                </div>
                <div class="movie-card bg-zinc-900 rounded-2xl overflow-hidden relative" onclick="playMedia('807', 'movie', 'Se7en')">
                    <div class="rizz-badge">RIZZ CHOICE</div>
                    <img src="https://image.tmdb.org/t/p/w500/69Snp98Y6S6559779v8u5XrsMG8.jpg" class="w-full">
                    <p class="p-4 font-bold text-sm truncate">Se7en</p>
                </div>
            </div>
        </section>

        <h2 id="grid-title" class="text-xl font-bold mb-6 text-zinc-500 uppercase tracking-widest">Trending Movies</h2>
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            <div class="col-span-full text-center py-20 text-zinc-500">Loading the rizz...</div>
        </div>
    </main>

    <div id="player-overlay">
        <div class="flex flex-col h-full">
            <div class="p-4 bg-zinc-900 flex justify-between items-center border-b border-zinc-800">
                <div class="flex items-center gap-4">
                    <h3 id="playing-title" class="text-xl font-bold text-red-600 uppercase">Now Playing</h3>
                    <div class="flex gap-2">
                        <button id="srv1" onclick="switchServer(1)" class="bg-zinc-800 px-3 py-1 rounded text-xs font-bold active-btn">Server 1</button>
                        <button id="srv2" onclick="switchServer(2)" class="bg-zinc-800 px-3 py-1 rounded text-xs font-bold">Server 2</button>
                    </div>
                </div>
                <button onclick="closePlayer()" class="bg-red-600 px-4 py-2 rounded-lg font-bold">CLOSE ×</button>
            </div>
            <div class="flex-grow bg-black">
                <iframe id="player-frame" src="" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer class="rizz-footer">
        <p class="font-black italic text-xl uppercase tracking-widest">
            Ur welcome - <span class="anton-name">Anton AKA Rizzking</span>
        </p>
    </footer>

    <script>
        const API_KEY = 'c151dd5e3f53032433742137e48cd90f'; 
        const grid = document.getElementById('movie-grid');
        const searchInput = document.getElementById('search-input');
        let currentId = '';
        let currentType = 'movie';

        async function loadMovies(query = '') {
            currentType = 'movie';
            const url = query 
                ? `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`
                : `https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('grid-title').innerText = query ? `Search: ${query}` : "Trending Movies";
            renderMedia(data.results, 'movie');
        }

        async function loadTV() {
            currentType = 'tv';
            const url = `https://api.themoviedb.org/3/trending/tv/day?api_key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('grid-title').innerText = "Trending Shows";
            renderMedia(data.results, 'tv');
        }

        function renderMedia(items, type) {
            grid.innerHTML = items.map(m => `
                <div class="movie-card bg-zinc-900 rounded-2xl overflow-hidden shadow-xl" onclick="playMedia('${m.id}', '${type}', '${(m.title || m.name).replace(/'/g, "")}')">
                    <img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w500' + m.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" class="w-full">
                    <div class="p-4">
                        <h3 class="font-bold text-sm line-clamp-1">${m.title || m.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-xs text-zinc-500">${(m.release_date || m.first_air_date)?.split('-')[0] || 'N/A'}</span>
                            <span class="text-xs bg-red-600/20 text-red-500 px-2 py-1 rounded">★ ${m.vote_average.toFixed(1)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function playMedia(id, type, title) {
            currentId = id;
            currentType = type;
            document.getElementById('playing-title').innerText = title;
            switchServer(1);
            document.getElementById('player-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function switchServer(num) {
            const frame = document.getElementById('player-frame');
            document.getElementById('srv1').classList.toggle('active-btn', num === 1);
            document.getElementById('srv2').classList.toggle('active-btn', num === 2);
            frame.src = num === 1 
                ? (currentType === 'movie' ? `https://vidking.net/embed/movie/${currentId}` : `https://vidking.net/embed/tv/${currentId}/1/1`)
                : (currentType === 'movie' ? `https://vidsrc.me/embed/movie?tmdb=${currentId}` : `https://vidsrc.me/embed/tv?tmdb=${currentId}&sea=1&epi=1`);
        }

        function closePlayer() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('player-frame').src = '';
            document.body.style.overflow = 'auto';
        }

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadMovies(e.target.value);
        });

        loadMovies();
    </script>
</body>
</html>
